name: update-grammar

# Keep the pinned grammar current with upstream's latest stable release.
# Weekly: check upstream tags; if a newer release exists, advance .grammar-pin,
# rebuild + verify the WASM, and open a PR. Publishing the bumped package stays
# a manual, human-gated step (OTP) — this only proposes the change.
on:
  schedule:
    - cron: "17 6 * * 1" # Mondays 06:17 UTC
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "25"

      - name: Advance pin to upstream latest release
        id: bump
        run: |
          node scripts/update-pin.mjs
          if git diff --quiet .grammar-pin; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up emscripten (for tree-sitter build --wasm)
        if: steps.bump.outputs.changed == 'true'
        uses: mymindstorm/setup-emsdk@v14

      - name: Rebuild + verify WASM from the new pin
        if: steps.bump.outputs.changed == 'true'
        run: |
          npm run build:wasm
          npm run verify:wasm

      - name: Open PR
        if: steps.bump.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: grammar-update
          base: main
          title: "chore: advance grammar pin to upstream latest release"
          commit-message: "chore: advance grammar pin + rebuild wasm to upstream latest"
          body: |
            Automated grammar update: upstream published a newer stable release tag.

            - `.grammar-pin` advanced to the latest release commit
            - WASM rebuilt from the new pin and `verify:wasm` confirmed reproducible

            Review the diff, then publish manually (OTP) per the family convention.
          labels: grammar-update
          delete-branch: true
